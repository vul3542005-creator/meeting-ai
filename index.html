<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會議 AI 助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--card:#fff;--blue:#007AFF;--red:#e03434;--green:#34C759;
  --t1:#1c1c1e;--t2:#6e6e73;--t3:#aeaeb2;--border:#d1d1d6;
  --font:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%}
#app{max-width:520px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── Key screen ── */
#s-key{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px}
#s-key .logo{font-size:48px;margin-bottom:4px}
#s-key h1{font-size:22px;font-weight:600;color:var(--t1)}
#s-key p{font-size:14px;color:var(--t2);text-align:center;line-height:1.6}
#s-key input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none;background:var(--card)}
#s-key input:focus{border-color:var(--blue)}
#s-key .note{font-size:12px;color:var(--t3);text-align:center}
#s-key .note a{color:var(--blue);text-decoration:none}

/* ── Main / tabs ── */
#s-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;padding:12px 0;border:none;background:none;font-size:15px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.tab-pane[hidden]{display:none!important}

/* ── Setup tab ── */
.setup-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.s-card{background:var(--card);border-radius:14px;padding:14px 16px}
.s-card label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.s-card textarea{width:100%;border:none;outline:none;font-size:15px;color:var(--t1);resize:none;background:transparent;font-family:var(--font);line-height:1.5}
.s-card input[type=text]{width:100%;border:none;outline:none;font-size:15px;color:var(--t1);background:transparent;font-family:var(--font)}
.data-preview{font-size:13px;color:var(--t2);background:var(--bg);border-radius:10px;padding:10px 12px;line-height:1.5;max-height:90px;overflow:hidden;white-space:pre-wrap;word-break:break-all;margin-bottom:6px}
.upload-btn{width:100%;padding:13px;border:1.5px dashed var(--border);border-radius:12px;background:var(--bg);color:var(--t2);font-size:15px;cursor:pointer;font-family:var(--font);text-align:center}
.file-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-g{background:#e8f8ee;color:#1a7a3a}
.badge-o{background:#fff3e0;color:#b45309}
.char-count{font-size:12px;color:var(--t3);margin-top:8px;text-align:right}
.file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.file-tag{display:flex;align-items:center;gap:8px;font-size:13px;background:var(--bg);padding:6px 10px;border-radius:8px}
.file-tag span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1)}
.file-tag .del{cursor:pointer;color:var(--t3);font-size:16px;flex-shrink:0}
.setup-footer{padding:10px 16px 20px;display:flex;flex-direction:column;gap:8px}

/* ── Meeting tab ── */
.mtg-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.mtg-hd h2{font-size:16px;font-weight:600}
.rec-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--t3);margin-right:6px;vertical-align:middle;transition:background .3s}
.rec-indicator.on{background:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rec-label{font-size:13px;color:var(--t2);vertical-align:middle}

/* ── Recording circle button ── */
.rec-btn{width:40px;height:40px;border-radius:50%;background:var(--bg);border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,border-color .2s}
.rec-btn.on{background:var(--red);border-color:var(--red)}
.rec-dot{width:16px;height:16px;border-radius:50%;background:var(--t3);transition:background .2s}
.rec-btn.on .rec-dot{background:#fff}

/* ── Transcript ── */
.mtg-body{flex:1;overflow:hidden;padding:8px 16px 4px;display:flex;flex-direction:column;gap:8px}
.trans-card{background:var(--card);border-radius:14px;padding:7px 12px;max-height:75px;overflow-y:auto;flex-shrink:0}
.trans-card h3{font-size:10px;font-weight:500;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.trans-line{font-size:12px;color:var(--t1);line-height:1.5;padding:1px 0}
.trans-time{font-size:10px;color:var(--t3);margin-right:5px}
.interim-text{font-size:12px;color:var(--t3);font-style:italic}

/* ── Chat ── */
.chat-card{background:var(--card);border-radius:14px;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.chat-card h3{font-size:12px;font-weight:500;color:var(--t3);padding:10px 14px 0;text-transform:uppercase;letter-spacing:.04em}
.chat-msgs{flex:1;overflow-y:auto;padding:6px 14px 4px;display:flex;flex-direction:column;gap:10px}
.brow{display:flex;gap:8px}
.brow.user{flex-direction:row-reverse}
.bubble{max-width:85%;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word}
.bubble.user{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bubble.ai{background:var(--bg);color:var(--t1);border-bottom-left-radius:4px}
.bubble.thinking{background:var(--bg);color:var(--t3);font-style:italic}
.bubble img{max-width:100%;border-radius:8px;margin-bottom:6px;display:block}
.img-bar{padding:4px 14px;display:flex;gap:6px;flex-wrap:wrap}
.img-thumb{position:relative;width:48px;height:48px}
.img-thumb img{width:48px;height:48px;object-fit:cover;border-radius:8px}
.img-thumb .rm{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--t2);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ── Input bar ── */
.input-bar{padding:6px 12px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;border-top:1px solid var(--border);background:var(--card)}
.input-bar textarea{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:20px;font-size:15px;outline:none;resize:none;max-height:100px;font-family:var(--font);line-height:1.4;background:var(--bg)}
.input-bar textarea:focus{border-color:var(--blue)}
.ico-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--bg)}
.ico-btn.blue{background:var(--blue);color:#fff}
.ico-btn.red{background:var(--red);color:#fff}
.ico-btn.green{background:var(--green);color:#fff}

/* ── Buttons ── */
.btn{padding:13px 0;border:none;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer;width:100%;font-family:var(--font)}
.btn-blue{background:var(--blue);color:#fff}
.mtg-actions{padding:4px 16px 6px;display:flex;gap:8px}
.btn-sm{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:var(--font)}
.mtg-actions .btn-sm{flex:1}

/* ── Misc ── */
.err{color:var(--red);font-size:13px;text-align:center}
[hidden]{display:none!important}

</style>
</head>
<body>
<div id="app">

<!-- ═══ Screen 1: API Key ═══ -->
<div id="s-key">
  <div class="logo">🎙️</div>
  <h1>會議 AI 助手</h1>
  <p>請輸入你的 Google Gemini API Key<br>存在瀏覽器中，不會上傳到任何伺服器</p>
  <input id="inp-key" type="password" placeholder="貼上你的 API Key..." autocomplete="off">
  <p class="err" id="key-err"></p>
  <button class="btn btn-blue" onclick="saveKey()">開始使用</button>
  <p class="note">取得免費 API Key：<a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
</div>

<!-- ═══ Main (Tabbed) ═══ -->
<div id="s-main" hidden>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-setup" onclick="switchTab('setup')">會議設定</button>
    <button class="tab-btn" id="tab-btn-mtg" onclick="switchTab('mtg')">開會中</button>
  </div>

  <!-- ─ Tab: 會議設定 ─ -->
  <div id="tab-setup" class="tab-pane">
    <div class="setup-body">
      <div class="s-card">
        <label>會議前資料</label>
        <div id="data-preview" class="data-preview" hidden></div>
        <div id="char-count" class="char-count" hidden></div>
      </div>
      <div class="s-card">
        <label>議程</label>
        <textarea id="inp-agenda" rows="3" placeholder="1. 產品方向討論&#10;2. 預算分配&#10;3. 待辦確認"></textarea>
      </div>
      <div class="s-card">
        <label>背景資料 / 待決議事項</label>
        <textarea id="inp-bg" rows="3" placeholder="上次會議決議、需要解決的問題等"></textarea>
      </div>
      <div class="s-card">
        <label>參與者</label>
        <input id="inp-ptcp" type="text" placeholder="王、李、張">
      </div>
      <div class="s-card">
        <div class="file-list" id="file-list"></div>
        <button class="upload-btn" onclick="document.getElementById('file-inp').click()">⬆ 上傳會議資料</button>
        <input id="file-inp" type="file" accept="image/*,.xlsx,.xls,.docx,.txt" multiple hidden onchange="handleFiles(this.files)">
        <div class="file-badges">
          <span class="badge badge-g">Excel .xlsx</span>
          <span class="badge badge-g">Word .docx</span>
          <span class="badge badge-g">文字 .txt</span>
          <span class="badge badge-o">圖片（需 API 額度）</span>
        </div>
      </div>
    </div>
    <div class="setup-footer">
      <button class="btn btn-blue" onclick="goMeeting()">進入會議 →</button>
      <button style="background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;font-family:var(--font);padding:4px 0" onclick="goKey()">更換 API Key</button>
    </div>
  </div>

  <!-- ─ Tab: 開會中 ─ -->
  <div id="tab-mtg" class="tab-pane" hidden>
    <div class="mtg-hd">
      <span>
        <span class="rec-indicator" id="rec-indicator"></span>
        <span class="rec-label" id="rec-label">未錄音</span>
      </span>
      <h2>會議進行中</h2>
      <button class="rec-btn" id="btn-rec" onclick="toggleRec()"><span class="rec-dot"></span></button>
    </div>
    <div class="mtg-body" id="meeting-body">
      <div class="trans-card" id="trans-card">
        <h3>即時轉錄</h3>
        <div id="trans-lines"><p style="color:var(--t3);font-size:13px">點擊右上角按鈕開始錄音</p></div>
        <div id="interim-box"></div>
      </div>
      <div class="chat-card">
        <h3>AI 對話</h3>
        <div class="chat-msgs" id="chat-msgs">
          <p style="color:var(--t3);font-size:14px;padding:8px 0">直接輸入問題，或按住 🎙️ 說話。</p>
        </div>
      </div>
    </div>
    <div class="img-bar" id="img-bar"></div>
    <div class="mtg-actions">
      <button class="btn-sm" id="btn-sum" style="background:#f0f7ff;color:var(--blue);border:1px solid #c0d8ff" onclick="genSummary()" disabled>📋 會議總結</button>
      <button class="btn-sm" style="background:var(--bg);color:var(--t2);border:1px solid var(--border)" onclick="exportTxt()">💾 匯出</button>
    </div>
    <div class="input-bar">
      <button class="ico-btn" onclick="document.getElementById('chat-img-inp').click()" title="上傳圖片">📷</button>
      <input id="chat-img-inp" type="file" accept="image/*" multiple hidden onchange="addChatImgs(this.files)">
      <textarea id="chat-inp" rows="1" placeholder="輸入問題，或按住 🎙️ 說話..." oninput="autoGrow(this)" onkeydown="chatKeydown(event)"></textarea>
      <button class="ico-btn green" id="btn-chat-voice"
        ontouchstart="startChatVoice(event)" ontouchend="stopChatVoice(event)"
        onmousedown="startChatVoice(event)" onmouseup="stopChatVoice(event)" onmouseleave="stopChatVoice(event)"
        title="按住說話">🎙️</button>
      <button class="ico-btn blue" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

</div><!-- #app -->
<script>

// ═══ State ═══
const KEY_STORE = 'gemini_api_key';
let apiKey = localStorage.getItem(KEY_STORE) || '';
let agenda='', bgInfo='', participants='', uploadedData='';
let trans=[], msgs=[], interim='', pendingImgs=[], thinking=false;
let recognition=null, isRecording=false;
let uploadedFiles=[];

// ═══ Init ═══
window.onload = () => {
  if (apiKey) {
    showScreen('s-main');
    document.getElementById('inp-key').value = apiKey;
  } else {
    showScreen('s-key');
  }
};

function showScreen(id) {
  ['s-key','s-main'].forEach(s => {
    document.getElementById(s).hidden = (s !== id);
  });
}

function switchTab(tab) {
  if (tab === 'mtg') saveSettings();
  ['setup','mtg'].forEach(t => {
    document.getElementById('tab-' + t).hidden = (t !== tab);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === tab);
  });
}

// ═══ API Key ═══
function saveKey() {
  const k = document.getElementById('inp-key').value.trim();
  if (k.length < 20) {
    document.getElementById('key-err').textContent = 'Key 太短，請確認是否完整複製';
    return;
  }
  apiKey = k;
  localStorage.setItem(KEY_STORE, k);
  document.getElementById('key-err').textContent = '';
  showScreen('s-main');
}

function goKey() { showScreen('s-key'); }

// ═══ Settings ═══
function saveSettings() {
  agenda = document.getElementById('inp-agenda').value.trim();
  bgInfo = document.getElementById('inp-bg').value.trim();
  participants = document.getElementById('inp-ptcp').value.trim();
  uploadedData = uploadedFiles.map(f => '\u300a' + f.name + '\u300b\n' + f.text).join('\n\n');
  updateCharCount();
}

function updateCharCount() {
  const a = document.getElementById('inp-agenda').value.trim();
  const b = document.getElementById('inp-bg').value.trim();
  const ud = uploadedFiles.map(f => f.text).join('\n');
  const allText = [a, b, ud].filter(Boolean).join('\n\n');
  const countEl = document.getElementById('char-count');
  const previewEl = document.getElementById('data-preview');
  if (allText) {
    countEl.textContent = '\u5df2\u5132\u5b58 ' + allText.length.toLocaleString() + ' \u5b57';
    countEl.hidden = false;
    const previewSrc = uploadedFiles.map(f => '\u300a' + f.name + '\u300b\n' + f.text.slice(0,100)).join('\n') || (a || b);
    previewEl.textContent = previewSrc.slice(0, 250) + (previewSrc.length > 250 ? '...' : '');
    previewEl.hidden = false;
  } else {
    countEl.hidden = true;
    previewEl.hidden = true;
  }
}

function goMeeting() {
  saveSettings();
  switchTab('mtg');
}

// ═══ File Upload ═══
async function handleFiles(files) {
  for (const f of files) {
    const name = f.name;
    const ext = name.split('.').pop().toLowerCase();
    let text = '';
    try {
      if (ext === 'txt') {
        text = await f.text();
      } else if (ext === 'xlsx' || ext === 'xls') {
        text = await readExcel(f);
      } else if (ext === 'docx') {
        text = await readDocx(f);
      } else if (f.type.startsWith('image/')) {
        const b64 = await toBase64(f);
        text = await ocrImage(b64, f.type);
      }
      if (text) {
        uploadedFiles.push({ name, text });
        renderFileList();
        updateCharCount();
      }
    } catch(e) {
      alert('\u8b80\u53d6 ' + name + ' \u5931\u6557\uff1a' + e.message);
    }
  }
  document.getElementById('file-inp').value = '';
}

function readExcel(f) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        let out = '';
        wb.SheetNames.forEach(sn => {
          out += '\u300a' + sn + '\u300b\n';
          const rows = XLSX.utils.sheet_to_csv(wb.Sheets[sn]);
          const lines = rows.split('\n').filter(r=>r.replace(/,/g,'').trim()).slice(0,300);
          out += lines.join('\n') + '\n';
        });
        res(out);
      } catch(e){ rej(e); }
    };
    reader.readAsArrayBuffer(f);
  });
}

function readDocx(f) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      mammoth.extractRawText({arrayBuffer: e.target.result})
        .then(r => res(r.value))
        .catch(rej);
    };
    reader.readAsArrayBuffer(f);
  });
}

function toBase64(f) {
  return new Promise((res,rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

async function ocrImage(b64, mimeType, model='gemini-2.5-flash') {
  const resp = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{
          role:'user',
          parts:[
            {inline_data:{mime_type:mimeType, data:b64}},
            {text:'\u8acb\u8fa8\u8b58\u9019\u5f35\u5716\u7247\u4e2d\u6240\u6709\u7684\u6587\u5b57\u5167\u5bb9\uff0c\u4fdd\u6301\u539f\u59cb\u683c\u5f0f\uff0c\u4e0d\u8981\u52a0\u5165\u4efb\u4f55\u8aaa\u660e'}
          ]
        }]
      })
    }
  );
  const data = await resp.json();
  if (!resp.ok) {
    const msg = data.error?.message || '\u8fa8\u8b58\u5931\u6557';
    if ((resp.status === 429 || resp.status === 503 || msg.includes('demand') || msg.includes('unavailable')) && model === 'gemini-2.5-flash') {
      return ocrImage(b64, mimeType, 'gemini-1.5-flash');
    }
    throw new Error(msg);
  }
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = uploadedFiles.map((f,i) =>
    '<div class="file-tag"><span>\ud83d\udcc4 ' + h(f.name) + '</span><span class="del" onclick="removeFile(' + i + ')">\u2715</span></div>'
  ).join('');
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderFileList();
  updateCharCount();
}

// ═══ Speech Recognition ═══
function toggleRec() { isRecording ? stopRec() : startRec(); }

function startRec() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { alert('\u6b64\u700f\u89bd\u5668\u4e0d\u652f\u63f4\u8a9e\u97f3\u8fa8\u8b58\uff0c\u8acb\u4f7f\u7528 Chrome'); return; }
  recognition = new SpeechRec();
  recognition.lang = 'zh-TW';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.onresult = e => {
    let fin='', intr='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else intr += e.results[i][0].transcript;
    }
    if (fin) { trans.push({t: now(), text: fin.trim()}); renderTrans(); setSumBtn(); }
    interim = intr;
    document.getElementById('interim-box').innerHTML = interim
      ? '<div class="interim-text">' + h(interim) + '</div>' : '';
  };
  recognition.onerror = e => { if (e.error !== 'no-speech') console.warn('SR error:', e.error); };
  recognition.onend = () => { if (isRecording) recognition.start(); };
  recognition.start();
  isRecording = true;
  document.getElementById('btn-rec').classList.add('on');
  document.getElementById('rec-indicator').classList.add('on');
  document.getElementById('rec-label').textContent = '\u9304\u97f3\u4e2d';
}

function stopRec() {
  if (recognition) { recognition.onend=null; recognition.stop(); recognition=null; }
  isRecording = false;
  document.getElementById('btn-rec').classList.remove('on');
  document.getElementById('rec-indicator').classList.remove('on');
  document.getElementById('rec-label').textContent = '\u5df2\u505c\u6b62';
}

// ═══ Chat ═══
function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function addChatImgs(files) {
  for (const f of files) {
    const r = new FileReader();
    r.onload = e => {
      pendingImgs.push({src: e.target.result, type: f.type, data: e.target.result.split(',')[1]});
      renderImgBar();
    };
    r.readAsDataURL(f);
  }
  document.getElementById('chat-img-inp').value = '';
}

function renderImgBar() {
  const el = document.getElementById('img-bar');
  el.innerHTML = pendingImgs.map((img,i) =>
    '<div class="img-thumb"><img src="' + img.src + '"><span class="rm" onclick="removePendingImg(' + i + ')">\u2715</span></div>'
  ).join('');
}

function removePendingImg(i) { pendingImgs.splice(i, 1); renderImgBar(); }

async function sendChat() {
  const inp = document.getElementById('chat-inp');
  const txt = inp.value.trim();
  if (!txt && pendingImgs.length === 0) return;
  if (thinking) return;

  const userMsg = { role:'user', content: txt, images: [...pendingImgs] };
  msgs.push(userMsg);
  pendingImgs = [];
  inp.value = ''; inp.style.height='auto';
  renderImgBar(); renderChat();

  thinking = true; setSumBtn();
  const aiMsg = { role:'assistant', content:'' };
  msgs.push(aiMsg); renderChat();

  try {
    await streamGemini(buildSysPrompt(), buildGeminiMsgs(), chunk => {
      aiMsg.content += chunk; renderChat();
    });
  } catch(e) {
    aiMsg.content = '\u274c \u932f\u8aa4\uff1a' + e.message; renderChat();
  }
  thinking = false; setSumBtn();
}

async function genSummary() {
  if (trans.length === 0 || thinking) return;
  thinking = true; setSumBtn();
  const sumMsg = { role:'assistant', content:'' };
  msgs.push({ role:'user', content:'\u8acb\u6839\u64da\u76ee\u524d\u7684\u9010\u5b57\u7a3f\uff0c\u751f\u6210\u5b8c\u6574\u7684\u6703\u8b70\u7e3d\u7d50\uff0c\u5305\u542b\uff1a1.\u8a0e\u8ad6\u6458\u8981 2.\u91cd\u8981\u6c7a\u8b70 3.\u5f85\u8fa6\u4e8b\u9805', images:[] });
  msgs.push(sumMsg); renderChat();
  try {
    await streamGemini(buildSysPrompt(), buildGeminiMsgs(), chunk => {
      sumMsg.content += chunk; renderChat();
    });
  } catch(e) {
    sumMsg.content = '\u274c \u932f\u8aa4\uff1a' + e.message; renderChat();
  }
  thinking = false; setSumBtn();
}

function buildSysPrompt() {
  // Always read latest values
  const a = document.getElementById('inp-agenda')?.value.trim() || agenda;
  const b = document.getElementById('inp-bg')?.value.trim() || bgInfo;
  const p = document.getElementById('inp-ptcp')?.value.trim() || participants;
  const ud = uploadedFiles.length
    ? uploadedFiles.map(f => '\u300a' + f.name + '\u300b\n' + f.text).join('\n\n')
    : uploadedData;

  let s = '\u4f60\u662f\u4e00\u500b\u5c08\u696d\u7684\u6703\u8b70 AI \u52a9\u624b\uff0c\u4f7f\u7528\u7e41\u9ad4\u4e2d\u6587\u56de\u7b54\u3002';
  if (a) s += '\n\n\u300a\u6703\u8b70\u8b70\u7a0b\u300b\n' + a;
  if (b) s += '\n\n\u300a\u80cc\u666f\u8cc7\u6599\u300b\n' + b;
  if (p) s += '\n\n\u300a\u53c3\u8207\u8005\u300b' + p;
  if (ud) s += '\n\n\u300a\u4e0a\u50b3\u8cc7\u6599\u300b\n' + ud.slice(0, 8000);
  const transTxt = trans.slice(-30).map(t => t.t + ' ' + t.text).join('\n');
  if (transTxt) s += '\n\n\u300a\u5373\u6642\u9010\u5b57\u7a3f\uff08\u6700\u8fd130\u689d\uff09\u300b\n' + transTxt;
  s += '\n\n\u6839\u64da\u4ee5\u4e0a\u8cc7\u6599\u56de\u7b54\u554f\u984c\u3002\u56de\u7b54\u8981\u7c21\u6f54\u3001\u7d50\u69cb\u5316\u3002';
  return s;
}

function buildGeminiMsgs() {
  const history = msgs.filter(m => m.content || (m.images && m.images.length > 0));
  return history.map(m => {
    const parts = [];
    if (m.images) m.images.forEach(img => parts.push({inline_data:{mime_type:img.type, data:img.data}}));
    if (m.content) parts.push({text: m.content});
    return { role: m.role === 'assistant' ? 'model' : 'user', parts };
  });
}

// ═══ Gemini API ═══
async function streamGemini(sysPrompt, contents, onChunk, model='gemini-2.5-flash') {
  if (!contents || contents.length === 0) throw new Error('\u6c92\u6709\u8a0a\u606f\u53ef\u4ee5\u9001\u51fa');
  while (contents.length > 0 && contents[contents.length-1].role === 'model' &&
         contents[contents.length-1].parts.every(p => !p.text || p.text === '')) {
    contents.pop();
  }
  if (contents.length === 0) throw new Error('\u6c92\u6709\u6709\u6548\u8a0a\u606f');

  const body = { contents, generationConfig: { maxOutputTokens: 2048 } };
  if (sysPrompt) body.system_instruction = { parts: [{text: sysPrompt}] };

  const url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':streamGenerateContent?alt=sse&key=' + apiKey;
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(()=>({error:{message:'HTTP '+res.status}}));
    const msg = err.error?.message || 'API \u932f\u8aa4';
    if ((res.status === 429 || res.status === 503 || msg.includes('demand') || msg.includes('unavailable') || msg.includes('no longer'))
        && model !== 'gemini-1.5-flash') {
      return streamGemini(sysPrompt, contents, onChunk, 'gemini-1.5-flash');
    }
    throw new Error(msg);
  }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split('\n');
    buf = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const json = line.slice(6).trim();
      if (json === '[DONE]') return;
      try {
        const d = JSON.parse(json);
        const txt = d.candidates?.[0]?.content?.parts?.[0]?.text;
        if (txt) onChunk(txt);
      } catch(e) {}
    }
  }
}

// ═══ Voice Query ═══
let chatVoiceRec = null, chatVoiceActive = false, chatVoiceFinal = '';

function startChatVoice(e) {
  e.preventDefault();
  if (chatVoiceActive) return;
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { alert('\u8acb\u4f7f\u7528 Chrome'); return; }
  chatVoiceActive = true; chatVoiceFinal = '';
  const btn = document.getElementById('btn-chat-voice');
  btn.classList.remove('green'); btn.classList.add('red'); btn.textContent = '\ud83d\udd34';

  chatVoiceRec = new SpeechRec();
  chatVoiceRec.lang = 'zh-TW';
  chatVoiceRec.continuous = true;
  chatVoiceRec.interimResults = true;
  chatVoiceRec.onresult = e => {
    let fin='', intr='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      if (e.results[i].isFinal) fin += e.results[i][0].transcript;
      else intr += e.results[i][0].transcript;
    }
    if (fin) chatVoiceFinal += fin;
    const inp = document.getElementById('chat-inp');
    inp.value = chatVoiceFinal + intr;
    autoGrow(inp);
  };
  chatVoiceRec.onend = () => {
    const inp = document.getElementById('chat-inp');
    inp.value = chatVoiceFinal; autoGrow(inp); inp.focus();
    chatVoiceActive = false; chatVoiceRec = null;
    const btn = document.getElementById('btn-chat-voice');
    btn.classList.remove('red'); btn.classList.add('green'); btn.textContent = '\ud83c\udfa4\ufe0f';
  };
  chatVoiceRec.onerror = e => { if (e.error !== 'no-speech') console.warn(e.error); };
  chatVoiceRec.start();
}

function stopChatVoice(e) {
  if (!chatVoiceActive || !chatVoiceRec) return;
  if (e) e.preventDefault();
  chatVoiceRec.stop();
}

// ═══ Render ═══
function renderTrans() {
  const el = document.getElementById('trans-lines');
  if (trans.length === 0) {
    el.innerHTML = '<p style="color:var(--t3);font-size:13px">\u9ede\u64ca\u53f3\u4e0a\u89d2\u6309\u9215\u958b\u59cb\u9304\u97f3</p>';
    return;
  }
  el.innerHTML = trans.slice(-50).map(l =>
    '<div class="trans-line"><span class="trans-time">' + l.t + '</span>' + h(l.text) + '</div>'
  ).join('');
  // 捲到最後一行
  const card = document.getElementById('trans-card');
  card.scrollTop = card.scrollHeight;
}

function renderChat() {
  const el = document.getElementById('chat-msgs');
  if (msgs.length === 0) {
    el.innerHTML = '<p style="color:var(--t3);font-size:14px;padding:8px 0">\u76f4\u63a5\u8f38\u5165\u554f\u984c\uff0c\u6216\u6309\u4f4f \ud83c\udfa4\ufe0f \u8aaa\u8a71\u3002</p>';
    return;
  }
  el.innerHTML = msgs.filter(m => m.content || (m.images && m.images.length > 0)).map(m => {
    let inner = '';
    if (m.images) m.images.forEach(img => { inner += '<img src="' + img.src + '">'; });
    if (m.role === 'assistant' && !m.content && thinking) {
      return '<div class="brow ai"><div class="bubble thinking">\u601d\u8003\u4e2d\u2026</div></div>';
    }
    if (m.content) inner += md2html(m.content);
    return '<div class="brow ' + (m.role==='user'?'user':'ai') + '"><div class="bubble ' + (m.role==='user'?'user':'ai') + '">' + inner + '</div></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function md2html(s) {
  return h(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
    .replace(/^[-\u2022] (.+)$/gm, '\u2022 $1')
    .replace(/\n/g, '<br>');
}

function setSumBtn() {
  document.getElementById('btn-sum').disabled = trans.length === 0 || thinking;
}

// ═══ Export ═══
function exportTxt() {
  const lines = [
    '===== \u6703\u8b70\u7d00\u9304 ===== ' + new Date().toLocaleString('zh-TW'),
    '\u8b70\u7a0b\uff1a' + (agenda||'(\u672a\u586b\u5beb)'),
    '\u53c3\u8207\u8005\uff1a' + (participants||'(\u672a\u586b\u5beb)'),
    '',
    '\u300a\u9010\u5b57\u7a3f\u300b',
    ...trans.map(t => t.t + ' ' + t.text),
    '',
    '\u300aAI \u5c0d\u8a71\u7d00\u9304\u300b',
    ...msgs.filter(m=>m.content).map(m => (m.role==='user'?'Q: ':'AI: ') + m.content)
  ];
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meeting_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}

// ═══ Utils ═══
function h(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function now(){ const d=new Date(); return p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds()); }
function p2(n){ return String(n).padStart(2,'0'); }
