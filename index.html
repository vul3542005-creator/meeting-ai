<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>會議 AI 助手</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--card:#fff;--blue:#007AFF;--red:#e03434;--green:#34C759;
  --t1:#1c1c1e;--t2:#6e6e73;--t3:#aeaeb2;--border:#d1d1d6;
  --font:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:16px;line-height:1.5;-webkit-text-size-adjust:100%}
#app{max-width:520px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── All screens share base ── */
.scr{display:flex;flex-direction:column;overflow:hidden;flex:1}

/* ── Shared header/footer ── */
.hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;flex-shrink:0}
.hd h2{font-size:18px;font-weight:600}
.back{background:none;border:none;color:var(--blue);font-size:15px;cursor:pointer;font-family:var(--font);padding:4px 0}
.scroll-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.foot1{padding:12px 16px 24px;flex-shrink:0}
.foot2{padding:12px 16px 24px;display:flex;gap:10px;flex-shrink:0}

/* ── Cards ── */
.card{background:var(--card);border-radius:14px;padding:14px 16px}
.card label{display:block;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:6px}
.card textarea,.card input[type=text],.card input[type=password]{width:100%;border:none;outline:none;font-size:15px;color:var(--t1);background:transparent;font-family:var(--font);resize:none;line-height:1.5}
.card textarea::placeholder,.card input::placeholder{color:var(--t3)}

/* ── Buttons ── */
.btn{padding:13px;border:none;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer;width:100%;font-family:var(--font);transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:default}
.btn-bl{background:var(--blue);color:#fff}
.btn-gy{background:var(--bg);color:var(--t1);border:1px solid var(--border)}
.btn-sm{padding:10px 0;border-radius:10px;font-size:14px;font-weight:500;border:1px solid var(--border);cursor:pointer;font-family:var(--font);flex:1;background:var(--bg);color:var(--t1)}

/* ── Error text ── */
.err-txt{color:var(--red);font-size:13px;text-align:center;min-height:16px}

/* ════ Screen 1: API Key ════ */
#s-key{align-items:center;justify-content:center;padding:32px 24px;gap:16px}
#s-key h1{font-size:22px;font-weight:600}
.key-sub{font-size:14px;color:var(--t2);text-align:center;line-height:1.6}
.key-inp{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:12px;font-size:15px;outline:none;background:var(--card);font-family:var(--font)}
.key-inp:focus{border-color:var(--blue)}
.key-note{font-size:12px;color:var(--t3);text-align:center}
.key-note a{color:var(--blue);text-decoration:none}

/* ════ Screen 2: Setup ════ */
.upload-zone{border:1.5px dashed var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer}
.upload-zone .uz-icon{font-size:28px;display:block;margin-bottom:4px}
.upload-zone p{font-size:13px;color:var(--t2)}
.ftag{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;border-radius:8px;background:var(--bg);margin-top:6px}
.ftag .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ftag .fx{cursor:pointer;color:var(--t3);font-size:16px;flex-shrink:0}
.warn-card{background:#fff8dc;border:1px solid #ffe082;border-radius:14px;padding:12px 16px;font-size:13px;color:#7a6002;line-height:1.5}

/* ════ Screen 3: Recording ════ */
#s-rec{align-items:center;justify-content:center;padding:32px 24px;gap:0}
.rec-name{font-size:18px;font-weight:600;text-align:center;margin-bottom:6px}
.rec-ptcp{font-size:13px;color:var(--t2);text-align:center;min-height:18px;margin-bottom:6px}
/* 補錄提示 */
.rec-seg-note{font-size:12px;color:var(--blue);background:rgba(0,122,255,.1);padding:3px 12px;border-radius:8px;margin-bottom:20px}
/* REC 圓圈徽章（參考附圖） */
.rec-circle{width:88px;height:88px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;letter-spacing:2px;margin-bottom:24px;flex-shrink:0;animation:rec-pulse 1.6s ease-in-out infinite}
.rec-circle.paused{animation:none;background:var(--t3);opacity:.7}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,52,52,.45)}60%{box-shadow:0 0 0 14px rgba(224,52,52,0)}}
.timer{font-size:clamp(56px,16vw,76px);font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:3px;margin-bottom:6px;color:var(--t1)}
.rec-stat{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:36px}
.rec-stat.paused{color:#FF9500}
/* 暫停＋停止按鈕排排站 */
.rec-btns{display:flex;gap:16px;align-items:center}
.rec-btn{display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 20px;border-radius:20px;border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;min-width:96px;transition:transform .1s}
.rec-btn:active{transform:scale(.93)}
.rec-btn .bi{font-size:26px;line-height:1}
.rec-btn.rp{background:var(--card);color:var(--t1);box-shadow:0 2px 10px rgba(0,0,0,.09)}
.rec-btn.rs{background:var(--red);color:#fff;box-shadow:0 5px 20px rgba(224,52,52,.32)}
.cancel-btn{font-size:14px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:var(--font);margin-top:28px;padding:8px}

/* ════ Screen 4: Processing ════ */
#s-proc{align-items:center;justify-content:center;padding:32px 24px;gap:18px}
.proc-icon{font-size:52px}
.proc-title{font-size:20px;font-weight:600}
.proc-sub{font-size:14px;color:var(--t2);text-align:center;line-height:1.6}
.steps{width:100%;display:flex;flex-direction:column;gap:8px}
.step{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:var(--card);font-size:14px;color:var(--t1)}
.step.s-off{color:var(--t3)}
.step.s-ok{color:var(--green)}
.step .si{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.step.s-on .si{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* 取消 / 繼續錄音 按鈕列 */
.proc-actions{display:flex;gap:10px;width:100%}
.proc-actions .btn-sm{font-size:13px;padding:9px 0}
.proc-actions .btn-cont{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ════ Screen 5: Output ════ */
#s-out .hd{border-bottom:1px solid var(--border);padding-bottom:12px}
.os{background:var(--card);border-radius:14px;padding:14px 16px}
.os h3{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sum-txt{font-size:15px;line-height:1.75;color:var(--t1);white-space:pre-wrap}
.dec-row{font-size:14px;padding:7px 0;border-bottom:1px solid var(--bg);line-height:1.6;color:var(--t1)}
.dec-row:last-child{border-bottom:none}
.tbl-wrap{overflow-x:auto;margin-top:2px}
.task-tbl{width:100%;border-collapse:collapse;font-size:13px}
.task-tbl th{background:var(--bg);padding:8px 9px;text-align:left;font-size:12px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border)}
.task-tbl td{padding:9px 9px;border-bottom:1px solid var(--bg);vertical-align:top;color:var(--t1);line-height:1.5}
.task-tbl tr:last-child td{border-bottom:none}
.note-txt{font-size:12px;color:var(--t2);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.b-h{background:#fff0f0;color:#c00}
.b-m{background:#fff8e0;color:#a06000}
.b-l{background:#f0fff4;color:#0a7a0a}
.empty-msg{text-align:center;color:var(--t2);font-size:14px;padding:20px 0}

[hidden]{display:none!important}
</style>
</head>
<body>
<div id="app">

<!-- ══════ Screen 1: API Key ══════ -->
<div id="s-key" class="scr">
  <div style="font-size:52px">🎙️</div>
  <h1>會議 AI 助手</h1>
  <p class="key-sub">請輸入你的 Google Gemini API Key<br>僅存在瀏覽器本地，不會上傳至任何伺服器</p>
  <input id="inp-key" class="key-inp" type="password" placeholder="貼上你的 Gemini API Key…" autocomplete="off">
  <p id="key-err" class="err-txt"></p>
  <button class="btn btn-bl" onclick="saveKey()">開始使用</button>
  <p class="key-note">取得免費 API Key：<a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></p>
</div>

<!-- ══════ Screen 2: Setup ══════ -->
<div id="s-setup" class="scr" hidden>
  <div class="hd">
    <button class="back" onclick="showScr('s-key')">← 返回</button>
    <h2>會議設定</h2>
    <div style="width:52px"></div>
  </div>
  <div class="scroll-body">
    <div class="card">
      <label>會議名稱</label>
      <input id="inp-title" type="text" placeholder="例：本週部門例會">
    </div>
    <div class="card">
      <label>議程</label>
      <textarea id="inp-agenda" rows="3" placeholder="1. 產品方向討論&#10;2. 預算分配&#10;3. 任務確認"></textarea>
    </div>
    <div class="card">
      <label>背景資料 / 待決議事項</label>
      <textarea id="inp-bg" rows="3" placeholder="上次決議、需解決的問題等"></textarea>
    </div>
    <div class="card">
      <label>參與者</label>
      <input id="inp-ptcp" type="text" placeholder="例：王、李、張">
    </div>
    <div class="card">
      <label>參考資料（選填）</label>
      <div class="upload-zone" onclick="document.getElementById('file-inp').click()">
        <span class="uz-icon">📎</span>
        <p>點擊上傳 Excel / Word / TXT</p>
        <input id="file-inp" type="file" accept=".xlsx,.xls,.docx,.txt" multiple hidden onchange="handleFiles(this.files)">
      </div>
      <div id="file-list"></div>
    </div>
    <div class="warn-card">🔒 錄音結束後將上傳至 Google AI 伺服器進行分析，請注意會議資訊安全。</div>
  </div>
  <div class="foot1">
    <button id="start-btn" class="btn btn-bl" onclick="startMeeting()">🎤 開始錄音</button>
  </div>
</div>

<!-- ══════ Screen 3: Recording ══════ -->
<div id="s-rec" class="scr" hidden>
  <div id="rec-name" class="rec-name">會議進行中</div>
  <div id="rec-ptcp" class="rec-ptcp"></div>
  <!-- 補錄提示（多段時才顯示） -->
  <div id="rec-seg-note" class="rec-seg-note" hidden></div>
  <!-- REC 徽章 -->
  <div id="rec-circle" class="rec-circle">REC</div>
  <!-- 計時器 -->
  <div id="timer" class="timer">00:00</div>
  <!-- 狀態文字 -->
  <div id="rec-stat" class="rec-stat">錄音中</div>
  <!-- 暫停 + 停止 -->
  <div class="rec-btns">
    <button id="pause-btn" class="rec-btn rp" onclick="togglePause()">
      <span id="pause-icon" class="bi">⏸️</span>
      <span id="pause-label">暫停</span>
    </button>
    <button class="rec-btn rs" onclick="stopRec()">
      <span class="bi">⏹️</span>
      <span>停止</span>
    </button>
  </div>
  <button class="cancel-btn" onclick="cancelRec()">取消（不儲存本次錄音）</button>
</div>

<!-- ══════ Screen 4: Processing ══════ -->
<div id="s-proc" class="scr" hidden>
  <div class="proc-icon">🤖</div>
  <div class="proc-title">AI 分析中</div>
  <div id="proc-sub" class="proc-sub">正在處理會議錄音，請稍候…</div>
  <div class="steps">
    <div class="step" id="step-0">
      <span class="si">⬆️</span><span>準備音頻資料</span>
    </div>
    <div class="step s-off" id="step-1">
      <span class="si">🤖</span><span>送出 Gemini 分析</span>
    </div>
    <div class="step s-off" id="step-2">
      <span class="si">📋</span><span>生成摘要與行動事項</span>
    </div>
  </div>
  <!-- 取消 / 繼續錄音 -->
  <div class="proc-actions">
    <button class="btn-sm" onclick="procCancel()">✕ 取消分析</button>
    <button class="btn-sm btn-cont" onclick="procContinueRec()">🎤 繼續錄音</button>
  </div>
  <p id="proc-err" class="err-txt" style="margin-top:2px"></p>
  <button id="retry-btn" class="btn btn-gy" onclick="retryProc()" hidden style="width:auto;padding:10px 28px;margin-top:4px">重試</button>
</div>

<!-- ══════ Screen 5: Output ══════ -->
<div id="s-out" class="scr" hidden>
  <div class="hd">
    <span id="out-date" style="font-size:12px;color:var(--t2)"></span>
    <h2 id="out-title" style="font-size:16px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">會議紀錄</h2>
    <div style="width:52px"></div>
  </div>
  <div class="scroll-body" id="out-body"></div>
  <div class="foot2" style="flex-direction:column;gap:8px">
    <div style="display:flex;gap:10px">
      <button class="btn-sm" onclick="exportTxt()">📄 TXT</button>
      <button class="btn-sm" onclick="exportXls()">📊 Excel</button>
    </div>
    <button class="btn btn-bl" onclick="confirmNewMtg()">✅ 確認已儲存，開始新會議</button>
  </div>
</div>

</div><!-- #app -->
<script>
// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
const KEY_S   = 'gemini_key';
const SETUP_S = 'mtg_setup_v3';
const OUTPUT_S = 'mtg_output_v1';  // 結果暫存，防頁面意外重整
let apiKey = localStorage.getItem(KEY_S) || '';

// Meeting context
let mtgTitle = '', mtgPtcp = '', mtgAgenda = '', mtgBg = '', uploadRef = '';
let uploadedFiles = [];

// Recording
let mediaRecorder = null;
let audioChunks   = [];
let audioStream   = null;
let recSecs       = 0;
let timerTick     = null;
let isPaused      = false;

// Multiple-segment support
let savedBlobs  = [];   // 前幾段已錄完的 Blob
let lastBlob    = null; // 最新一段

// Processing / Output
let fetchAbortCtrl = null;  // 用於中斷 Gemini fetch
let outputData     = null;

// ══════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════
window.onload = () => {
  // 離頁保護：在結果畫面時彈出警示
  window.addEventListener('beforeunload', e => {
    if (!document.getElementById('s-out').hidden) {
      e.preventDefault();
      return e.returnValue = '會議紀錄尚未儲存，確定要離開？';
    }
  });

  if (apiKey.length >= 20) {
    document.getElementById('inp-key').value = apiKey;
    loadForm();
    // 若頁面意外重整，從 localStorage 恢復上次結果
    try {
      const saved = JSON.parse(localStorage.getItem(OUTPUT_S) || 'null');
      if (saved && saved.outputData) {
        outputData = saved.outputData;
        mtgTitle   = saved.mtgTitle  || '';
        mtgPtcp    = saved.mtgPtcp   || '';
        renderOutput();
        showScr('s-out');
        return;
      }
    } catch(e) {}
    showScr('s-setup');
  } else {
    showScr('s-key');
  }
};

function showScr(id) {
  ['s-key','s-setup','s-rec','s-proc','s-out'].forEach(s => {
    document.getElementById(s).hidden = (s !== id);
  });
}

// ══════════════════════════════════════════════
//  Screen 1 – API Key
// ══════════════════════════════════════════════
function saveKey() {
  const k   = document.getElementById('inp-key').value.trim();
  const err = document.getElementById('key-err');
  if (k.length < 20) { err.textContent = 'API Key 格式有誤，請再確認'; return; }
  err.textContent = '';
  apiKey = k;
  localStorage.setItem(KEY_S, k);
  loadForm();
  showScr('s-setup');
}

// ══════════════════════════════════════════════
//  Screen 2 – Setup & File Upload
// ══════════════════════════════════════════════
function loadForm() {
  try {
    const d = JSON.parse(localStorage.getItem(SETUP_S) || '{}');
    document.getElementById('inp-title').value  = d.title  || '';
    document.getElementById('inp-agenda').value = d.agenda || '';
    document.getElementById('inp-bg').value     = d.bg     || '';
    document.getElementById('inp-ptcp').value   = d.ptcp   || '';
  } catch(e) {}
}

function saveForm() {
  localStorage.setItem(SETUP_S, JSON.stringify({
    title  : document.getElementById('inp-title').value.trim(),
    agenda : document.getElementById('inp-agenda').value.trim(),
    bg     : document.getElementById('inp-bg').value.trim(),
    ptcp   : document.getElementById('inp-ptcp').value.trim()
  }));
}

async function handleFiles(files) {
  for (const f of files) {
    const ext = f.name.split('.').pop().toLowerCase();
    let text = '';
    try {
      if (ext === 'txt')              text = await f.text();
      else if (ext === 'xlsx' || ext === 'xls') text = await readXlsx(f);
      else if (ext === 'docx')        text = await readDocx(f);
      if (text) uploadedFiles.push({ name: f.name, text });
    } catch(e) { alert('讀取失敗：' + f.name + '\n' + e.message); }
  }
  document.getElementById('file-inp').value = '';
  renderFiles();
}

function readXlsx(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        let out = '';
        wb.SheetNames.forEach(n => {
          out += '【' + n + '】\n' +
            XLSX.utils.sheet_to_csv(wb.Sheets[n])
              .split('\n').filter(r => r.replace(/,/g,'').trim()).slice(0, 200).join('\n') + '\n';
        });
        res(out);
      } catch(e) { rej(e); }
    };
    r.readAsArrayBuffer(f);
  });
}

function readDocx(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => mammoth.extractRawText({ arrayBuffer: e.target.result }).then(r => res(r.value)).catch(rej);
    r.readAsArrayBuffer(f);
  });
}

function renderFiles() {
  document.getElementById('file-list').innerHTML = uploadedFiles.map((f, i) =>
    `<div class="ftag"><span class="fname">📄 ${h(f.name)}</span><span class="fx" onclick="rmFile(${i})">✕</span></div>`
  ).join('');
}

function rmFile(i) { uploadedFiles.splice(i, 1); renderFiles(); }

// ══════════════════════════════════════════════
//  Screen 3 – Recording
// ══════════════════════════════════════════════
async function startMeeting() {
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 等待麥克風授權…';

  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '🎤 開始錄音';
    alert('無法取得麥克風：' + (e.message || e));
    return;
  }

  // 全新一場會議 → 清除前段殘留
  savedBlobs = [];
  lastBlob   = null;

  saveForm();
  mtgTitle  = document.getElementById('inp-title').value.trim()  || '未命名會議';
  mtgPtcp   = document.getElementById('inp-ptcp').value.trim();
  mtgAgenda = document.getElementById('inp-agenda').value.trim();
  mtgBg     = document.getElementById('inp-bg').value.trim();
  uploadRef = uploadedFiles.map(f => '【' + f.name + '】\n' + f.text).join('\n\n').slice(0, 8000);

  setupRecorder();

  document.getElementById('rec-name').textContent = mtgTitle;
  document.getElementById('rec-ptcp').textContent = mtgPtcp;
  document.getElementById('rec-seg-note').hidden  = true;
  recSecs = 0;
  resetRecUI();
  updateTimer();
  timerTick = setInterval(() => { recSecs++; updateTimer(); }, 1000);

  btn.disabled = false;
  btn.textContent = '🎤 開始錄音';
  showScr('s-rec');
}

// 共用：初始化 MediaRecorder（不 reset recSecs，補錄時繼續計時）
function setupRecorder() {
  audioChunks = [];
  const prefer = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  const mime   = prefer.find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';
  try {
    mediaRecorder = new MediaRecorder(
      audioStream,
      mime ? { mimeType: mime, audioBitsPerSecond: 24000 } : {}
    );
  } catch(e) {
    mediaRecorder = new MediaRecorder(audioStream);
  }
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
  mediaRecorder.onstop = onRecStop;
  mediaRecorder.start(1000);
}

function resetRecUI() {
  isPaused = false;
  document.getElementById('rec-circle').className   = 'rec-circle';
  document.getElementById('rec-stat').className     = 'rec-stat';
  document.getElementById('rec-stat').textContent   = savedBlobs.length > 0 ? '補錄中' : '錄音中';
  document.getElementById('pause-icon').textContent  = '⏸️';
  document.getElementById('pause-label').textContent = '暫停';
}

function updateTimer() {
  const hh = Math.floor(recSecs / 3600);
  const mm = Math.floor((recSecs % 3600) / 60);
  const ss = recSecs % 60;
  document.getElementById('timer').textContent =
    (hh > 0 ? p2(hh) + ':' : '') + p2(mm) + ':' + p2(ss);
}

function stopRec() {
  clearInterval(timerTick);
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    if (mediaRecorder.state === 'paused') mediaRecorder.resume();
    mediaRecorder.stop();
  }
  if (audioStream) audioStream.getTracks().forEach(t => t.stop());
}

function cancelRec() {
  if (!confirm('確定取消？本次錄音（含所有補錄段）將不會儲存。')) return;
  clearInterval(timerTick);
  isPaused = false;
  savedBlobs = [];
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.ondataavailable = null;
    mediaRecorder.onstop = null;
    if (mediaRecorder.state === 'paused') mediaRecorder.resume();
    mediaRecorder.stop();
  }
  if (audioStream) audioStream.getTracks().forEach(t => t.stop());
  audioChunks = [];
  showScr('s-setup');
}

// ── 暫停 / 繼續 ──
function togglePause() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

  if (isPaused) {
    if (typeof mediaRecorder.resume === 'function') mediaRecorder.resume();
    isPaused = false;
    timerTick = setInterval(() => { recSecs++; updateTimer(); }, 1000);
    document.getElementById('pause-icon').textContent  = '⏸️';
    document.getElementById('pause-label').textContent = '暫停';
    document.getElementById('rec-circle').className    = 'rec-circle';
    document.getElementById('rec-stat').className      = 'rec-stat';
    document.getElementById('rec-stat').textContent    = savedBlobs.length > 0 ? '補錄中' : '錄音中';
  } else {
    if (typeof mediaRecorder.pause === 'function') mediaRecorder.pause();
    isPaused = true;
    clearInterval(timerTick);
    document.getElementById('pause-icon').textContent  = '▶️';
    document.getElementById('pause-label').textContent = '繼續';
    document.getElementById('rec-circle').className    = 'rec-circle paused';
    document.getElementById('rec-stat').className      = 'rec-stat paused';
    document.getElementById('rec-stat').textContent    = '已暫停';
  }
}

function onRecStop() {
  const mType = mediaRecorder.mimeType || 'audio/webm';
  lastBlob = new Blob(audioChunks, { type: mType });
  beginProcess(lastBlob);
}

// ══════════════════════════════════════════════
//  Screen 4 – Processing
// ══════════════════════════════════════════════
function beginProcess(blob) {
  document.getElementById('proc-err').textContent = '';
  document.getElementById('retry-btn').hidden = true;
  resetSteps();
  showScr('s-proc');
  processAudio(blob);
}

function retryProc() {
  if (lastBlob) beginProcess(lastBlob);
}

// ── 取消分析 → 丟棄所有錄音，回設定 ──
function procCancel() {
  if (fetchAbortCtrl) fetchAbortCtrl.abort();
  savedBlobs = [];
  lastBlob   = null;
  showScr('s-setup');
}

// ── 繼續錄音 → 保留本段，回錄音畫面補錄 ──
async function procContinueRec() {
  if (fetchAbortCtrl) fetchAbortCtrl.abort();

  // 把剛才那段存起來
  if (lastBlob) {
    savedBlobs.push(lastBlob);
    lastBlob = null;
  }

  // 重新取麥克風
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    alert('無法取得麥克風：' + (e.message || e));
    savedBlobs = [];
    showScr('s-setup');
    return;
  }

  setupRecorder();

  // 顯示補錄段數提示
  const segNote = document.getElementById('rec-seg-note');
  segNote.textContent = `🔄 補錄第 ${savedBlobs.length + 1} 段（前 ${savedBlobs.length} 段已保留）`;
  segNote.hidden = false;

  resetRecUI();
  updateTimer();  // recSecs 繼續累積，不重置
  timerTick = setInterval(() => { recSecs++; updateTimer(); }, 1000);
  showScr('s-rec');
}

// ── Steps ──
const STEP_ICONS = ['⬆️', '🤖', '📋'];

function resetSteps() {
  [0, 1, 2].forEach(i => {
    const el = document.getElementById('step-' + i);
    el.className = 'step' + (i > 0 ? ' s-off' : '');
    el.querySelector('.si').textContent = STEP_ICONS[i];
  });
}

function setStep(n) {
  [0, 1, 2].forEach(i => {
    const el = document.getElementById('step-' + i);
    const si = el.querySelector('.si');
    if      (i < n)  { el.className = 'step s-ok'; si.textContent = '✅'; }
    else if (i === n) { el.className = 'step s-on'; si.textContent = STEP_ICONS[i]; }
    else              { el.className = 'step s-off'; si.textContent = STEP_ICONS[i]; }
  });
}

function showProcErr(msg) {
  document.getElementById('proc-err').textContent = msg;
  document.getElementById('retry-btn').hidden = false;
}

async function processAudio(blob) {
  fetchAbortCtrl = new AbortController();

  // 合併所有段（前段 + 本段）
  const allBlobs = [...savedBlobs, blob];
  const segCount = allBlobs.length;

  // ── Step 0: 轉 base64 ──
  setStep(0);
  let audioParts;
  try {
    audioParts = await blobsToBase64(allBlobs);
  } catch(e) {
    showProcErr('音頻處理失敗：' + e.message);
    return;
  }

  // ── Step 1: call Gemini ──
  setStep(1);
  let rawText;
  try {
    rawText = await callGemini(audioParts, segCount);
  } catch(e) {
    if (e.name === 'AbortError') return;  // 使用者取消，靜默處理
    showProcErr('AI 分析失敗：' + e.message);
    return;
  }

  // ── Step 2: parse & render ──
  setStep(2);
  outputData = parseJSON(rawText);
  await delay(600);
  // 存入 localStorage，防止頁面意外重整後資料消失
  try {
    localStorage.setItem(OUTPUT_S, JSON.stringify({ outputData, mtgTitle, mtgPtcp }));
  } catch(e) {}
  renderOutput();
  showScr('s-out');
}

// 多個 Blob → base64 parts 陣列
async function blobsToBase64(blobs) {
  const totalSize = blobs.reduce((s, b) => s + b.size, 0);
  const MB = totalSize / (1024 * 1024);
  if (totalSize > 15 * 1024 * 1024) {
    throw new Error(
      `錄音總大小過大（${MB.toFixed(1)} MB）。\n24 kbps 下約可錄 80 分鐘，建議縮短後重試。`
    );
  }
  const parts = [];
  for (const blob of blobs) {
    const mime  = blob.type.split(';')[0] || 'audio/webm';
    const buf   = await blob.arrayBuffer();
    const bytes = new Uint8Array(buf);
    const CHUNK = 8192;
    let bin = '';
    for (let i = 0; i < bytes.length; i += CHUNK) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    parts.push({ data: btoa(bin), mime });
  }
  return parts;
}

function buildSys() {
  let s = '你是一個專業的會議記錄助手，使用繁體中文輸出。';
  if (mtgAgenda) s += '\n\n【本次會議議程】\n' + mtgAgenda;
  if (mtgBg)     s += '\n\n【背景資料 / 待決議事項】\n' + mtgBg;
  if (mtgPtcp)   s += '\n\n【參與者】' + mtgPtcp;
  if (uploadRef) s += '\n\n【參考資料（請在分析與任務中主動對照以下內容）】\n' + uploadRef;
  return s;
}

async function callGemini(audioParts, segCount = 1, model = 'gemini-2.5-flash') {
  // 'gemini-1.5-flash-retry' 是重試標記，實際呼叫仍用 1.5-flash
  const actualModel = model === 'gemini-1.5-flash-retry' ? 'gemini-1.5-flash' : model;

  // 多段提示
  const segNote = segCount > 1
    ? `本次會議共有 ${segCount} 段錄音（含補錄），請合併分析全程。\n`
    : '';
  // 參考資料提示
  const refNote = uploadRef
    ? `請務必對照系統提示中的議程、背景資料及上傳的參考文件，分析錄音內容是否覆蓋了各項議程，並將參考資料中的待辦事項更新至任務表。\n`
    : '';

  const userPrompt =
    segNote + refNote +
    `請仔細聆聽並分析這段會議錄音，以繁體中文輸出。` +
    `只輸出純 JSON（不含任何 markdown、說明文字），嚴格遵守以下結構：\n` +
    `{\n` +
    `  "summary": "整體討論摘要（條列重點，用 \\n 分隔，至少 3 點）",\n` +
    `  "decisions": ["決議1", "決議2"],\n` +
    `  "tasks": [\n` +
    `    {\n` +
    `      "task": "具體任務描述",\n` +
    `      "assignee": "負責人或部門（未提及填「待確認」）",\n` +
    `      "deadline": "截止日期（未提及填「未定」）",\n` +
    `      "priority": "高、中或低",\n` +
    `      "notes": "補充說明（無則填「-」）"\n` +
    `    }\n` +
    `  ]\n` +
    `}\n` +
    `若無明確決議或任務，對應陣列填 []。只輸出 JSON，其他什麼都不要。`;

  const inlineParts = audioParts.map(a => ({ inline_data: { mime_type: a.mime, data: a.data } }));

  const body = {
    contents: [{
      role : 'user',
      parts: [...inlineParts, { text: userPrompt }]
    }],
    system_instruction : { parts: [{ text: buildSys() }] },
    generationConfig   : { maxOutputTokens: 4096 }
  };

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${actualModel}:generateContent?key=${apiKey}`,
    {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(body),
      signal : fetchAbortCtrl?.signal
    }
  );

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    // 429 配額超限 or 503 伺服器過載 → 降級至 1.5-flash
    if ((resp.status === 429 || resp.status === 503) && model === 'gemini-2.5-flash') {
      return callGemini(audioParts, segCount, 'gemini-1.5-flash');
    }
    // 1.5-flash 也過載 → 等 3 秒再試一次
    if ((resp.status === 429 || resp.status === 503) && model === 'gemini-1.5-flash') {
      await delay(3000);
      return callGemini(audioParts, segCount, 'gemini-1.5-flash-retry');
    }
    throw new Error(err.error?.message || 'API 錯誤 ' + resp.status);
  }

  const data = await resp.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

function parseJSON(text) {
  text = (text || '').replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(text); } catch(e) {}
  const m = text.match(/\{[\s\S]+\}/);
  if (m) try { return JSON.parse(m[0]); } catch(e) {}
  return { summary: text || '（AI 未能正確輸出，請重試）', decisions: [], tasks: [] };
}

// ══════════════════════════════════════════════
//  Screen 5 – Output
// ══════════════════════════════════════════════
function renderOutput() {
  const d = outputData || {};

  document.getElementById('out-date').textContent  = new Date().toLocaleDateString('zh-TW');
  document.getElementById('out-title').textContent = mtgTitle || '會議紀錄';

  let html = '';

  html += `<div class="os">
    <h3>📝 討論摘要</h3>
    <div class="sum-txt">${h(d.summary || '（未產生摘要）')}</div>
  </div>`;

  if (d.decisions?.length) {
    html += `<div class="os"><h3>✅ 重要決議</h3>`;
    html += d.decisions.map(dec => `<div class="dec-row">• ${h(dec)}</div>`).join('');
    html += `</div>`;
  }

  if (d.tasks?.length) {
    html += `<div class="os"><h3>📋 行動事項</h3><div class="tbl-wrap">`;
    html += `<table class="task-tbl">
      <thead><tr><th>任務</th><th>負責人</th><th>截止</th><th>優先</th></tr></thead>
      <tbody>`;
    html += d.tasks.map(t => {
      const bc   = t.priority === '高' ? 'b-h' : t.priority === '中' ? 'b-m' : 'b-l';
      const note = (t.notes && t.notes !== '-')
        ? `<div class="note-txt">${h(t.notes)}</div>` : '';
      return `<tr>
        <td>${h(t.task)}${note}</td>
        <td>${h(t.assignee)}</td>
        <td style="white-space:nowrap">${h(t.deadline)}</td>
        <td><span class="badge ${bc}">${h(t.priority)}</span></td>
      </tr>`;
    }).join('');
    html += `</tbody></table></div></div>`;
  } else {
    html += `<div class="os"><div class="empty-msg">本次會議無明確行動事項</div></div>`;
  }

  document.getElementById('out-body').innerHTML = html;
}

// ══════════════════════════════════════════════
//  Export
// ══════════════════════════════════════════════
function exportTxt() {
  const d    = outputData || {};
  const nowS = new Date().toLocaleString('zh-TW');
  const lines = [
    '【會議紀錄】',
    '日期：' + nowS,
    '名稱：' + mtgTitle,
    '參與者：' + (mtgPtcp || '（未填）'),
    '',
    '══════════════════════',
    '一、討論摘要',
    '══════════════════════',
    d.summary || '（無）',
    '',
    '══════════════════════',
    '二、重要決議',
    '══════════════════════',
    ...(d.decisions?.length
      ? d.decisions.map((v, i) => `${i + 1}. ${v}`)
      : ['（無明確決議）']),
    '',
    '══════════════════════',
    '三、行動事項',
    '══════════════════════',
    ...(d.tasks?.length
      ? d.tasks.map((t, i) =>
          `${i + 1}. ${t.task}\n` +
          `   負責人：${t.assignee} ｜ 截止：${t.deadline} ｜ 優先：${t.priority}\n` +
          `   備注：${t.notes}`)
      : ['（無明確行動事項）'])
  ];

  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  dlFile(blob, 'meeting_' + dateStr() + '.txt');
}

function exportXls() {
  const d  = outputData || {};
  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.aoa_to_sheet([
    ['會議名稱', mtgTitle],
    ['日期',     new Date().toLocaleDateString('zh-TW')],
    ['參與者',   mtgPtcp],
    [],
    ['討論摘要'],
    [d.summary || ''],
    [],
    ['重要決議'],
    ...(d.decisions?.length ? d.decisions.map(v => [v]) : [['（無）']])
  ]);
  ws1['!cols'] = [{ wch: 14 }, { wch: 65 }];
  XLSX.utils.book_append_sheet(wb, ws1, '會議摘要');

  const ws2 = XLSX.utils.aoa_to_sheet([
    ['任務', '負責人 / 部門', '截止日期', '優先級', '備注'],
    ...(d.tasks?.length
      ? d.tasks.map(t => [t.task, t.assignee, t.deadline, t.priority, t.notes])
      : [['（無行動事項）', '', '', '', '']])
  ]);
  ws2['!cols'] = [{ wch: 32 }, { wch: 16 }, { wch: 12 }, { wch: 8 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, ws2, '行動事項');

  XLSX.writeFile(wb, 'meeting_' + dateStr() + '.xlsx');
}

function newMtg() {
  localStorage.removeItem(OUTPUT_S);  // 確認開始新會議才清除暫存
  outputData     = null;
  lastBlob       = null;
  savedBlobs     = [];
  fetchAbortCtrl = null;
  audioChunks    = [];
  isPaused       = false;
  uploadedFiles  = [];
  document.getElementById('file-list').innerHTML = '';
  showScr('s-setup');
}

// 確認鈕：一定要按、且確認彈窗通過，才能離開結果畫面
function confirmNewMtg() {
  if (!confirm('確定要開始新會議？\n請先確認已下載或儲存會議紀錄。')) return;
  newMtg();
}

// ══════════════════════════════════════════════
//  Utils
// ══════════════════════════════════════════════
function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function p2(n)    { return String(n).padStart(2, '0'); }
function delay(ms){ return new Promise(r => setTimeout(r, ms)); }
function dateStr(){ return new Date().toISOString().slice(0, 10); }
function dlFile(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}
